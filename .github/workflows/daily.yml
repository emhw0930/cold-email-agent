name: Daily job digest + site refresh

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC = 8:00 AM ET
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pypdf

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          PROSPEO_API_KEY=${{ secrets.PROSPEO_API_KEY }}
          SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          SHEETS_SPREADSHEET_ID=${{ secrets.SHEETS_SPREADSHEET_ID }}
          YOUR_NAME=${{ secrets.YOUR_NAME }}
          EOF

      - name: Write resume text for fit ranking
        run: |
          mkdir -p assets
          printf '%s' "${{ secrets.RESUME_TEXT }}" > assets/resume.txt

      - name: Run daily workflow (site + top-10 email)
        run: python src/daily_workflow.py --to ${{ secrets.DIGEST_TO }}

      - name: Commit refreshed site + dedup state
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@github.com"
          git add docs/index.html data/h1b_employers.db
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily refresh: site + emailed-roles state [skip ci]"
            git pull --rebase origin main
            git push
          fi
